<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenMux Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav-bar">
  <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
  </button>
  <a href="#" class="nav-logo">ZenMux<span>Hub</span></a>
  <div class="nav-links">
    <button class="button-secondary" id="btn-settings">Settings</button>
    <button class="button-primary" id="nav-new-btn">New Chat</button>
  </div>
</nav>

<div class="main-container">
  <aside class="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-section" style="flex:1;overflow-y:auto;padding:var(--spacing-lg)">
        <h3>History</h3>
        <input type="text" id="history-search" class="sidebar-search" placeholder="Search conversations..." spellcheck="false">
        <div id="conversation-list" class="conversation-list"></div>
      </div>
      <div class="sidebar-section" style="padding:var(--spacing-lg);border-top:1px solid var(--canvas-soft);flex-shrink:0">
        <h3>Keys</h3>
        <button class="button-subtle" id="btn-key-usage" style="width:100%">Key Usage Dashboard</button>
      </div>
    </div>
  </aside>

  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <h1 id="chat-title">New Chat</h1>
        <select id="header-model" class="model-select"></select>
        <span id="img-support-badge" style="font-size:11px;padding:2px 8px;border-radius:var(--rounded-pill);background:var(--canvas-soft);color:var(--body);white-space:nowrap;display:none"></span>
      </div>
      <span id="token-count" style="font-size:12px;color:var(--body);white-space:nowrap"></span>
    </div>

    <div id="chat-content" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div id="welcome-screen" class="welcome-screen">
        <h1>What can I help with?</h1>
        <p>Choose a model and start a conversation.</p>
        <div class="welcome-suggestions">
          <button class="suggestion-chip" data-text="Explain quantum computing in simple terms">Explain quantum computing</button>
          <button class="suggestion-chip" data-text="Write a Python script to sort a list">Write Python code</button>
          <button class="suggestion-chip" data-text="Summarize the latest AI news">Latest AI news</button>
          <button class="suggestion-chip" data-text="Compare React and Vue.js">React vs Vue</button>
        </div>
      </div>
      <div id="messages-container" class="messages-container" style="display:none"></div>
      <button id="stop-btn" class="stop-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg> Stop</button>
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrapper">
            <textarea id="message-input" class="message-input" placeholder="Message..." rows="1"></textarea>
            <button class="attach-btn" id="attach-btn" title="Attach image"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
            <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">
            <div id="image-preview" class="image-preview" style="display:none"><img id="preview-img" src=""><button class="remove-image-btn" id="btn-remove-image">&times;</button></div>
            <button class="send-btn" id="send-btn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
        </div>
      </div>
    </div>

    <div id="platform-area" style="flex:1;display:none;overflow-y:auto">
      <div class="platform-dashboard" id="platform-dashboard"></div>
    </div>

    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
      <span style="flex:1"></span>
      <span id="model-status"></span>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
