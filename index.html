<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenMux Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav-bar">
  <a href="#" class="nav-logo">ZenMux<span>Hub</span></a>
  <div class="nav-links">
    <button class="button-secondary" id="btn-settings">Settings</button>
    <button class="button-primary" id="nav-new-btn">New Chat</button>
  </div>
</nav>

<div class="main-container">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-pane="chat">Chat</button>
      <button class="sidebar-tab" data-pane="images">Images</button>
      <button class="sidebar-tab" data-pane="platform">Platform</button>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-pane active" id="pane-chat">
        <div class="sidebar-section">
          <h3>Model</h3>
          <select id="sidebar-model" class="model-select" style="width:100%;max-width:100%;margin-bottom:var(--spacing-md)"></select>
          <h3>Parameters</h3>
          <label style="font-size:12px;color:var(--body);display:block;margin-bottom:4px">Temperature</label>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" style="width:100%">
          <span id="temp-val" style="font-size:12px;color:var(--body)">0.7</span>
          <label style="font-size:12px;color:var(--body);display:block;margin:8px 0 4px">Max Tokens</label>
          <input type="number" id="max-tokens" value="4096" min="1" max="128000" style="width:100%;padding:var(--spacing-sm);border-radius:var(--rounded-md);border:1px solid var(--canvas-soft);font-size:14px">
          <label style="font-size:12px;color:var(--body);display:block;margin:8px 0 4px">Reasoning</label>
          <select id="reasoning-effort" class="model-select" style="width:100%;max-width:100%">
            <option value="">None</option>
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="sidebar-section" style="flex:1;overflow-y:auto">
          <h3>History</h3>
          <div id="conversation-list" class="conversation-list"></div>
        </div>
      </div>
      <div class="sidebar-pane" id="pane-images">
        <div class="sidebar-section">
          <h3>Image Model</h3>
          <select id="img-model" class="model-select" style="width:100%;max-width:100%;margin-bottom:var(--spacing-md)"></select>
          <h3>Settings</h3>
          <label style="font-size:12px;color:var(--body);display:block;margin-bottom:4px">Size</label>
          <select id="img-size" class="model-select" style="width:100%;max-width:100%;margin-bottom:var(--spacing-md)">
            <option value="1024x1024">1024x1024</option>
            <option value="1536x1024">1536x1024</option>
            <option value="1024x1536">1024x1536</option>
            <option value="1920x1080">1920x1080</option>
            <option value="1080x1920">1080x1920</option>
          </select>
          <label style="font-size:12px;color:var(--body);display:block;margin-bottom:4px">Count</label>
          <select id="img-count" class="model-select" style="width:100%;max-width:100%;margin-bottom:var(--spacing-md)">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
          <label style="font-size:12px;color:var(--body);display:block;margin-bottom:4px">Quality</label>
          <select id="img-quality" class="model-select" style="width:100%;max-width:100%">
            <option value="standard">Standard</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="sidebar-pane" id="pane-platform">
        <div class="sidebar-section">
          <h3>Management</h3>
          <button class="button-subtle" id="btn-flow-rate" style="width:100%;margin-bottom:var(--spacing-sm)">Flow Rate</button>
          <button class="button-subtle" id="btn-balance" style="width:100%;margin-bottom:var(--spacing-sm)">PAYG Balance</button>
          <button class="button-subtle" id="btn-subscription-btn" style="width:100%;margin-bottom:var(--spacing-sm)">Subscription</button>
        </div>
      </div>
    </div>
  </aside>

  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <h1 id="chat-title">New Chat</h1>
        <select id="header-model" class="model-select"></select>
        <span id="protocol-badge" style="font-size:11px;padding:2px 8px;border-radius:var(--rounded-pill);background:var(--canvas-soft);color:var(--body);white-space:nowrap">openai</span>
        <span id="img-support-badge" style="font-size:11px;padding:2px 8px;border-radius:var(--rounded-pill);background:var(--canvas-soft);color:var(--body);white-space:nowrap;display:none"></span>
      </div>
      <span id="token-count" style="font-size:12px;color:var(--body);white-space:nowrap"></span>
    </div>

    <div id="chat-content" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div id="welcome-screen" class="welcome-screen">
        <h1>What can I help with?</h1>
        <p>Choose a model and start a conversation.</p>
        <div class="welcome-suggestions">
          <button class="suggestion-chip" data-text="Explain quantum computing in simple terms">Explain quantum computing</button>
          <button class="suggestion-chip" data-text="Write a Python script to sort a list">Write Python code</button>
          <button class="suggestion-chip" data-text="Summarize the latest AI news">Latest AI news</button>
          <button class="suggestion-chip" data-text="Compare React and Vue.js">React vs Vue</button>
        </div>
      </div>
      <div id="messages-container" class="messages-container" style="display:none"></div>
      <button id="stop-btn" class="stop-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg> Stop</button>
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrapper">
            <textarea id="message-input" class="message-input" placeholder="Message..." rows="1"></textarea>
            <button class="attach-btn" id="attach-btn" title="Attach image"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
            <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">
            <div id="image-preview" class="image-preview" style="display:none"><img id="preview-img" src=""><button class="remove-image-btn" id="btn-remove-image">&times;</button></div>
            <button class="send-btn" id="send-btn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
        </div>
      </div>
    </div>

    <div id="image-gen-area" class="image-gen-area">
      <div class="image-gen-form">
        <label>Prompt</label>
        <textarea id="img-prompt" rows="3" placeholder="A cute cat wearing a tiny hat..."></textarea>
        <div class="image-gen-row">
          <div><label>Width</label><input type="number" id="img-width" value="1024" min="256" max="3840" step="16"></div>
          <div><label>Height</label><input type="number" id="img-height" value="1024" min="256" max="3840" step="16"></div>
        </div>
        <button class="button-primary" id="btn-generate-image" style="width:100%">Generate</button>
      </div>
      <div id="image-gallery" class="image-gallery"></div>
    </div>

    <div id="platform-area" style="flex:1;display:none;overflow-y:auto">
      <div class="platform-dashboard" id="platform-dashboard"></div>
    </div>

    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
      <span style="flex:1"></span>
      <span id="model-status"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-card">
    <h2>Settings</h2>
    <label>ZenMux API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-...">
    <label>Management API Key (for Platform)</label>
    <input type="password" id="mgmt-key-input" placeholder="sk-mgmt-...">
    <label>API Base URL</label>
    <input type="text" id="base-url-input" placeholder="https://zenmux.ai/api/v1">
    <label>Default Model</label>
    <select id="default-model-select"></select>
    <label style="display:flex;align-items:center;gap:var(--spacing-sm);margin-bottom:var(--spacing-lg);cursor:pointer">
      <input type="checkbox" id="remember-key"> Remember API keys
    </label>
    <div class="modal-actions">
      <button class="button-subtle" id="btn-settings-cancel">Cancel</button>
      <button class="button-primary" id="btn-settings-save">Save</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
